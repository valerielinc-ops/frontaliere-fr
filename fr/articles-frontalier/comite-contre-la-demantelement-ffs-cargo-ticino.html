<meta property="og:description" content="Le comité Non au démantèlement de Ffs Cargo présente ses propositions pour le Tessin 📊💡⚠️  ## Présentation du comité  Le comité No allo smantellamento de Ffs Cargo est une coalition de citoyens et d'organisations qui se sont mobilisés pour sauver la filiale de Ffs Cargo dans le Tessin. Notre objectif est de préserver les emplois et les activités économiques dans la région.  ## Propositions du comité  - Développer des activités de transport ferroviaire et routier pour maintenir l'emploi et la croissance économique dans le Tessin. - Renforcer la coopération entre les autorités locales, régionales et fédérales pour trouver des solutions durables pour le secteur du transport. - Promouvoir la sensibilisation et l'éducation des citoyens sur l'importance de la préservation de l'emploi et de l'économie dans la région.  ## Appel à l'action  Nous invitons les citoyens, les entreprises et les institutions à se joindre à nous pour sauver la filiale de Ffs Cargo dans le Tessin. Ensemble, nous pouvons préserver l'emploi et la croissance économique dans la région.  [Apprenez-en plus sur les actions à prendre](nav:azione)">
