<meta property="og:description" content="Analyse du rôle de Marcello Guido en tant que pionnier du déconstructivisme, non conforme dans l'architecture italienne. Les architectes italiens comme Marcello Guido ont contribué à faire émerger un mouvement qui remet en question les normes traditionnelles. Le déconstructivisme italien, qui s'est développé dans les années 80, a été influencé par des artistes et des architectes tels que Marcello Guido, qui ont exploré de nouvelles formes et des matériaux innovants. Leur travail a ouvert la voie à une architecture plus expressive et plus expérimentale. Les architectes italiens ont continué à explorer les possibilités du déconstructivisme, créant des bâtiments qui sont à la fois esthétiquement attrayants et fonctionnels.">
